# PATH: .github/workflows/ci-cd.yml
# Pipeline CI/CD SkillHub Frontend
# SonarCloud : poun-2108 / poun-2108_skillhub_CICD_front
# Declenchement : push ou PR sur master, main, develop

name: CI/CD Frontend SkillHub

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

env:
  NODE_VERSION: '20'
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-frontend

jobs:

  # ── JOB 1 : Tests unitaires + rapport de couverture ────────
  test:
    name: Tests et couverture
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0            # historique complet requis par SonarCloud

      - name: Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Tests + coverage
        run: npm run test:coverage
        env:
          CI: true

      # Sauvegarde le rapport coverage/ pour le job sonarcloud
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov
          path: coverage/
          retention-days: 7

  # ── JOB 2 : Analyse SonarCloud ──────────────────────────────
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: test
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: npm ci
        run: npm ci

      # Regenere le lcov.info pour SonarCloud
      - name: Tests + coverage pour SonarCloud
        run: npm run test:coverage
        env:
          CI: true

      # Action officielle SonarCloud
      # GITHUB_TOKEN : genere automatiquement par GitHub Actions
      # SONAR_TOKEN  : a ajouter dans Settings > Secrets > Actions
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

  # ── JOB 3 : Docker build + push ─────────────────────────────
  # Declenche uniquement sur push vers master ou main (pas les PRs)
  docker:
    name: Docker Build et Push
    runs-on: ubuntu-latest
    needs: [test, sonarcloud]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}