# ============================================================
# nginx.conf - Configuration Nginx pour SPA React
# Redirige toutes les routes vers index.html (client-side routing)
# ============================================================

server {
    listen 80;
    server_name _;

    # Dossier racine des fichiers statiques
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip pour les assets statiques
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache agressif pour les assets Vite (hash dans le nom de fichier)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Toutes les routes → index.html (React Router gère le routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Désactive l'affichage de la version Nginx (sécurité)
    server_tokens off;
}